# kind 本地集群（HOST_INFRA=1）：基础设施在本机 Docker，不占用 5432/6379/9876
# 创建：HOST_INFRA=1 make up（集群不存在时自动使用本配置）
# 从默认集群切换：kind delete cluster --name im-local && HOST_INFRA=1 make up
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: im-local
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30000
        hostPort: 10000
        protocol: TCP
      - containerPort: 30100
        hostPort: 10100
        protocol: TCP
      - containerPort: 30200
        hostPort: 10200
        protocol: TCP
      - containerPort: 30300
        hostPort: 10300
        protocol: TCP
      - containerPort: 30400
        hostPort: 10400
        protocol: TCP
      - containerPort: 30500
        hostPort: 10500
        protocol: TCP
      - containerPort: 30600
        hostPort: 10600
        protocol: TCP
      - containerPort: 30800
        hostPort: 10800
        protocol: TCP
