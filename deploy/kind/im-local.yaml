# kind 本地集群：将 NodePort 映射到本机常用端口
# 创建：kind create cluster --name im-local --config deploy/kind/im-local.yaml
# 修改 extraPortMappings 后需重建集群：kind delete cluster --name im-local && make up
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: im-local
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30000
        hostPort: 10000
        protocol: TCP
      - containerPort: 30100
        hostPort: 10100
        protocol: TCP
      - containerPort: 30200
        hostPort: 10200
        protocol: TCP
      - containerPort: 30300
        hostPort: 10300
        protocol: TCP
      - containerPort: 30400
        hostPort: 10400
        protocol: TCP
      - containerPort: 30500
        hostPort: 10500
        protocol: TCP
      - containerPort: 30600
        hostPort: 10600
        protocol: TCP
      - containerPort: 30700
        hostPort: 10700
        protocol: TCP
      - containerPort: 30800
        hostPort: 10800
        protocol: TCP
      # 基础设施（集群内 infra 时 NodePort → 本机；HOST_INFRA=1 时走本机 Docker 直连）
      - containerPort: 30432
        hostPort: 5432
        protocol: TCP
      - containerPort: 30637
        hostPort: 6379
        protocol: TCP
      - containerPort: 30876
        hostPort: 9876
        protocol: TCP
      - containerPort: 30911
        hostPort: 10911
        protocol: TCP
