# kind 本地集群：将 NodePort 映射到本机常用端口
# 创建：kind create cluster --name im-local --config deploy/kind/im-local.yaml
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: im-local
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30000
        hostPort: 10000
        protocol: TCP
      - containerPort: 30100
        hostPort: 10100
        protocol: TCP
      - containerPort: 30200
        hostPort: 10200
        protocol: TCP
      - containerPort: 30300
        hostPort: 10300
        protocol: TCP
      - containerPort: 30400
        hostPort: 10400
        protocol: TCP
      - containerPort: 30500
        hostPort: 10500
        protocol: TCP
      - containerPort: 30600
        hostPort: 10600
        protocol: TCP
      - containerPort: 30700
        hostPort: 10700
        protocol: TCP
      - containerPort: 30800
        hostPort: 10800
        protocol: TCP
