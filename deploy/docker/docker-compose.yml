# 本地基础设施：MySQL / Redis / RocketMQ（含 Dashboard :8082）
# 启动：make host-infra-up  或  docker compose -f deploy/docker/docker-compose.yml up -d
name: im-infra

services:
  mysql:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.mysql
    image: im-infra/mysql:local
    container_name: im-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: im
      MYSQL_USER: im
      MYSQL_PASSWORD: im
      MYSQL_DATABASE: im
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uim", "-pim"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: im-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  rocketmq-namesrv:
    image: apache/rocketmq:5.3.2
    container_name: im-rocketmq-namesrv
    command: sh mqnamesrv
    ports:
      - "9876:9876"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/9876'"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 20s

  rocketmq-broker:
    image: apache/rocketmq:5.3.2
    container_name: im-rocketmq-broker
    command: sh mqbroker -n rocketmq-namesrv:9876 -c /home/rocketmq/broker.conf
    depends_on:
      rocketmq-namesrv:
        condition: service_healthy
    ports:
      - "10909:10909"
      - "10911:10911"
    environment:
      NAMESRV_ADDR: rocketmq-namesrv:9876
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${BROKER_CONF:-./broker.conf}:/home/rocketmq/broker.conf:ro

  rocketmq-dashboard:
    image: apacherocketmq/rocketmq-dashboard:latest
    container_name: im-rocketmq-dashboard
    ports:
      - "8082:8082"
    environment:
      JAVA_OPTS: "-Drocketmq.namesrv.addr=rocketmq-namesrv:9876"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      rocketmq-namesrv:
        condition: service_healthy
      rocketmq-broker:
        condition: service_started

volumes:
  mysql-data:
    name: im-mysql-data
    external: true
