apiVersion: v1
kind: ConfigMap
metadata:
  name: transfer-config
  labels:
    app.kubernetes.io/name: transfer
    app.kubernetes.io/part-of: im
    app.kubernetes.io/component: transfer
data:
  transfer.yaml: |
    Name: transfer
    HealthPort: 10800
    MySQL:
      DSN: im:im@tcp(mysql:3306)/im?parseTime=true&charset=utf8mb4&loc=Local
    Redis:
      Addr: host.docker.internal:6379
    RocketMQ:
      NameServer:
        - host.docker.internal:9876
    Transfer:
      InboxMergeMs: 100
      OfflineMergeSec: 10
      MemberBatch: 500
