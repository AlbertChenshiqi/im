apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-api
  labels:
    app: gateway-api
    app.kubernetes.io/name: gateway-api
    app.kubernetes.io/part-of: im
    app.kubernetes.io/component: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway-api
  template:
    metadata:
      labels:
        app: gateway-api
        app.kubernetes.io/name: gateway-api
        app.kubernetes.io/component: gateway
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - gateway-api
              topologyKey: kubernetes.io/hostname
      containers:
      - name: gateway-api
        image: im/gateway/gateway-api:dev
        imagePullPolicy: IfNotPresent
        args: ["-f", "/etc/im/gateway/gateway-api.yaml"]
        ports:
        - containerPort: 10000
          name: http
        env:
        - name: GATEWAY_INSTANCE_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        livenessProbe:
          httpGet:
            path: /v1/health
            port: 10000
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /v1/health
            port: 10000
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            memory: 512Mi
        volumeMounts:
        - name: config
          mountPath: /etc/im/gateway
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: gateway-api-config
