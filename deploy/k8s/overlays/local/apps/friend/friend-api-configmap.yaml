apiVersion: v1
kind: ConfigMap
metadata:
  name: friend-api-config
  labels:
    app.kubernetes.io/name: friend-api
    app.kubernetes.io/part-of: im
    app.kubernetes.io/component: friend
data:
  friend-api.yaml: |
    Name: friend-api
    Host: 0.0.0.0
    Port: 10200
    Auth:
      AccessSecret: dev-secret-change-in-production
      AccessExpire: 604800
    
    MySQL:
      DSN: im:im@tcp(localhost:3306)/im?parseTime=true&charset=utf8mb4&loc=Local
    Log:
      ServiceName: friend-api
      Mode: console
      Level: info
      Stat: false
    ConversationRpc:
      Endpoints:
        - conversation-rpc:20400
