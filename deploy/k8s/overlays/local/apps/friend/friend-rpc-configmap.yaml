apiVersion: v1
kind: ConfigMap
metadata:
  name: friend-rpc-config
  labels:
    app.kubernetes.io/name: friend-rpc
    app.kubernetes.io/part-of: im
    app.kubernetes.io/component: friend
data:
  friend-rpc.yaml: |
    Name: friend.rpc
    ListenOn: 0.0.0.0:20200
    Postgres:
      DSN: postgres://im:im@host.docker.internal:5432/im?sslmode=disable
    Log:
      ServiceName: friend-rpc
      Mode: console
      Level: info
      Stat: false
    ConversationRpc:
      Endpoints:
        - conversation-rpc:20400
