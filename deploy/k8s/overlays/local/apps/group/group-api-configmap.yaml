apiVersion: v1
kind: ConfigMap
metadata:
  name: group-api-config
  labels:
    app.kubernetes.io/name: group-api
    app.kubernetes.io/part-of: im
    app.kubernetes.io/component: group
data:
  group-api.yaml: |
    Name: group-api
    Host: 0.0.0.0
    Port: 10300
    Auth:
      AccessSecret: dev-secret-change-in-production
      AccessExpire: 604800
      DevMode: true
    MySQL:
      DSN: im:im@tcp(mysql:3306)/im?parseTime=true&charset=utf8mb4&loc=Local
    Log:
      ServiceName: group-api
      Mode: console
      Level: info
      Stat: false
