apiVersion: apps/v1
kind: Deployment
metadata:
  name: group-api
  labels:
    app: group-api
    app.kubernetes.io/name: group-api
    app.kubernetes.io/part-of: im
    app.kubernetes.io/component: group
spec:
  replicas: 1
  selector:
    matchLabels:
      app: group-api
  template:
    metadata:
      labels:
        app: group-api
        app.kubernetes.io/name: group-api
        app.kubernetes.io/component: group
    spec:
      containers:
      - name: group-api
        image: im/group/group-api:dev
        imagePullPolicy: IfNotPresent
        command: ["/usr/local/bin/group-api"]
        args: ["-f", "/etc/im/group/group-api.yaml"]
        ports:
        - containerPort: 10300
          name: http
        readinessProbe:
          tcpSocket:
            port: 10300
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            memory: 512Mi
        volumeMounts:
        - name: config
          mountPath: /etc/im/group
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: group-api-config
