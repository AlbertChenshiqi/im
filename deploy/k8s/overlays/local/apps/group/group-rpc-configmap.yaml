apiVersion: v1
kind: ConfigMap
metadata:
  name: group-rpc-config
  labels:
    app.kubernetes.io/name: group-rpc
    app.kubernetes.io/part-of: im
    app.kubernetes.io/component: group
data:
  group-rpc.yaml: |
    Name: group.rpc
    ListenOn: 0.0.0.0:20300
    MySQL:
      DSN: im:im@tcp(mysql:3306)/im?parseTime=true&charset=utf8mb4&loc=Local
    Log:
      ServiceName: group-rpc
      Mode: console
      Level: info
      Stat: false
