apiVersion: v1
kind: ConfigMap
metadata:
  name: user-rpc-config
  labels:
    app.kubernetes.io/name: user-rpc
    app.kubernetes.io/part-of: im
    app.kubernetes.io/component: user
data:
  user-rpc.yaml: |
    Name: user.rpc
    ListenOn: 0.0.0.0:20100
    JwtAuth:
      AccessSecret: dev-secret-change-in-production
    MySQL:
      DSN: im:im@tcp(localhost:3306)/im?parseTime=true&charset=utf8mb4&loc=Local
    Log:
      ServiceName: user-rpc
      Mode: console
      Level: info
      Stat: false
