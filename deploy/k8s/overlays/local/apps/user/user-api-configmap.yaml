apiVersion: v1
kind: ConfigMap
metadata:
  name: user-api-config
  labels:
    app.kubernetes.io/name: user-api
    app.kubernetes.io/part-of: im
    app.kubernetes.io/component: user
data:
  user-api.yaml: |
    Name: user-api
    Host: 0.0.0.0
    Port: 10100
    Auth:
      AccessSecret: dev-secret-change-in-production
      AccessExpire: 604800
      DevMode: true
    MySQL:
      DSN: im:im@tcp(localhost:3306)/im?parseTime=true&charset=utf8mb4&loc=Local
    Log:
      ServiceName: user-api
      Mode: console
      Level: info
      Stat: false
