apiVersion: v1
kind: ConfigMap
metadata:
  name: push-api-config
  labels:
    app.kubernetes.io/name: push-api
    app.kubernetes.io/part-of: im
    app.kubernetes.io/component: push
data:
  push-api.yaml: |
    Name: push-api
    Host: 0.0.0.0
    Port: 10700
    Auth:
      AccessSecret: dev-secret-change-in-production
      AccessExpire: 604800
    
    MySQL:
      DSN: im:im@tcp(localhost:3306)/im?parseTime=true&charset=utf8mb4&loc=Local
    Log:
      ServiceName: push-api
      Mode: console
      Level: info
      Stat: false
    Redis:
      Addr: host.docker.internal:6379
