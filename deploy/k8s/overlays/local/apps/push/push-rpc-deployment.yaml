apiVersion: apps/v1
kind: Deployment
metadata:
  name: push-rpc
  labels:
    app: push-rpc
    app.kubernetes.io/name: push-rpc
    app.kubernetes.io/part-of: im
    app.kubernetes.io/component: push
spec:
  replicas: 1
  selector:
    matchLabels:
      app: push-rpc
  template:
    metadata:
      labels:
        app: push-rpc
        app.kubernetes.io/name: push-rpc
        app.kubernetes.io/component: push
    spec:
      containers:
      - name: push-rpc
        image: im/push/push-rpc:dev
        imagePullPolicy: IfNotPresent
        args: ["-f", "/etc/im/push/push-rpc.yaml"]
        ports:
        - containerPort: 20700
          name: http
        readinessProbe:
          tcpSocket:
            port: 20700
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            memory: 512Mi
        volumeMounts:
        - name: config
          mountPath: /etc/im/push
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: push-rpc-config
