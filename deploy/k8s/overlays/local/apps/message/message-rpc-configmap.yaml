apiVersion: v1
kind: ConfigMap
metadata:
  name: message-rpc-config
  labels:
    app.kubernetes.io/name: message-rpc
    app.kubernetes.io/part-of: im
    app.kubernetes.io/component: message
data:
  message-rpc.yaml: |
    Name: message.rpc
    ListenOn: 0.0.0.0:20500
    Postgres:
      DSN: postgres://im:im@postgres:5432/im?sslmode=disable
    Log:
      ServiceName: message-rpc
      Mode: console
      Level: info
      Stat: false
    GroupRpc:
      Endpoints:
        - group-rpc:20300
    Kafka:
      Brokers:
        - kafka:9092
    RedisStore:
      Addr: redis:6379
