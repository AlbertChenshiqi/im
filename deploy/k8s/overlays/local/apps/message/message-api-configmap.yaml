apiVersion: v1
kind: ConfigMap
metadata:
  name: message-api-config
  labels:
    app.kubernetes.io/name: message-api
    app.kubernetes.io/part-of: im
    app.kubernetes.io/component: message
data:
  message-api.yaml: |
    Name: message-api
    Host: 0.0.0.0
    Port: 10500
    Auth:
      AccessSecret: dev-secret-change-in-production
      AccessExpire: 604800
    
    MySQL:
      DSN: im:im@tcp(localhost:3306)/im?parseTime=true&charset=utf8mb4&loc=Local
    Log:
      ServiceName: message-api
      Mode: console
      Level: info
      Stat: false
