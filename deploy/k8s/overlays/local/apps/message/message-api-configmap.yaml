apiVersion: v1
kind: ConfigMap
metadata:
  name: message-api-config
  labels:
    app.kubernetes.io/name: message-api
    app.kubernetes.io/part-of: im
    app.kubernetes.io/component: message
data:
  message-api.yaml: |
    Name: message-api
    Host: 0.0.0.0
    Port: 10500
    Auth:
      AccessSecret: dev-secret-change-in-production
      AccessExpire: 604800
    
    Postgres:
      DSN: postgres://im:im@postgres:5432/im?sslmode=disable
    Log:
      ServiceName: message-api
      Mode: console
      Level: info
      Stat: false
