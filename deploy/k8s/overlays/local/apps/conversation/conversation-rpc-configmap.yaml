apiVersion: v1
kind: ConfigMap
metadata:
  name: conversation-rpc-config
  labels:
    app.kubernetes.io/name: conversation-rpc
    app.kubernetes.io/part-of: im
    app.kubernetes.io/component: conversation
data:
  conversation-rpc.yaml: |
    Name: conversation.rpc
    ListenOn: 0.0.0.0:20400
    Postgres:
      DSN: postgres://im:im@postgres:5432/im?sslmode=disable
    Log:
      ServiceName: conversation-rpc
      Mode: console
      Level: info
      Stat: false
