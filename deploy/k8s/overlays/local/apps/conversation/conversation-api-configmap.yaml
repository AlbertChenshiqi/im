apiVersion: v1
kind: ConfigMap
metadata:
  name: conversation-api-config
  labels:
    app.kubernetes.io/name: conversation-api
    app.kubernetes.io/part-of: im
    app.kubernetes.io/component: conversation
data:
  conversation-api.yaml: |
    Name: conversation-api
    Host: 0.0.0.0
    Port: 10400
    Auth:
      AccessSecret: dev-secret-change-in-production
      AccessExpire: 604800
    
    Postgres:
      DSN: postgres://im:im@host.docker.internal:5432/im?sslmode=disable
    Log:
      ServiceName: conversation-api
      Mode: console
      Level: info
      Stat: false
    Redis:
      Addr: host.docker.internal:6379
    Conversation:
      DirectRecentDays: 0
