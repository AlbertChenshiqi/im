---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-data
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  labels:
    app: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.4
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: im
            - name: MYSQL_USER
              value: im
            - name: MYSQL_PASSWORD
              value: im
            - name: MYSQL_DATABASE
              value: im
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
            - name: init
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          readinessProbe:
            exec:
              command: [mysqladmin, ping, -h, 127.0.0.1, -uim, -pim]
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mysql-data
        - name: init
          configMap:
            name: mysql-init
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
spec:
  type: NodePort
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306
      nodePort: 30306
---
apiVersion: v1
kind: Deployment
metadata:
  name: redis
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: [redis-cli, ping]
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis
spec:
  type: NodePort
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
      nodePort: 30637
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rocketmq-namesrv
  labels:
    app: rocketmq-namesrv
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rocketmq-namesrv
  template:
    metadata:
      labels:
        app: rocketmq-namesrv
    spec:
      containers:
        - name: namesrv
          image: apache/rocketmq:5.3.2
          command: ["sh", "mqnamesrv"]
          ports:
            - containerPort: 9876
          readinessProbe:
            tcpSocket:
              port: 9876
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: rocketmq-namesrv
spec:
  type: NodePort
  selector:
    app: rocketmq-namesrv
  ports:
    - port: 9876
      targetPort: 9876
      nodePort: 30876
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rocketmq-broker
  labels:
    app: rocketmq-broker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rocketmq-broker
  template:
    metadata:
      labels:
        app: rocketmq-broker
    spec:
      containers:
        - name: broker
          image: apache/rocketmq:5.3.2
          command: ["sh", "mqbroker", "-n", "rocketmq-namesrv:9876", "autoCreateTopicEnable=true"]
          ports:
            - containerPort: 10911
            - containerPort: 10909
          env:
            - name: NAMESRV_ADDR
              value: rocketmq-namesrv:9876
          readinessProbe:
            tcpSocket:
              port: 10911
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: rocketmq-broker
spec:
  type: NodePort
  selector:
    app: rocketmq-broker
  ports:
    - name: broker-vip
      port: 10911
      targetPort: 10911
      nodePort: 30911
    - name: broker-ha
      port: 10909
      targetPort: 10909
      nodePort: 30909
