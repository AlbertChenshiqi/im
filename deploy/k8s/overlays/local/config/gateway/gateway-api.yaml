Name: gateway-api
Host: 0.0.0.0
Port: 10000
MessageRpc:
  Endpoints:
    - message-rpc:20500
Redis:
  Addr: host.docker.internal:6379
RocketMQ:
  NameServer:
    - host.docker.internal:9876
WebSocket:
  OnlineTTL: 300
  HeartbeatInterval: 60
  HeartbeatMaxMiss: 3
  MaxMessageBytes: 65536
  ConnectionMode: multi
  AllowedOrigins:
    - "*"
Auth:
  AccessSecret: dev-secret-change-in-production
Log:
  ServiceName: gateway-api
  Mode: console
  Level: info
  Stat: false
