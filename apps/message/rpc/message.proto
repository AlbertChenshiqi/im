syntax = "proto3";
package message;
option go_package = "./message";

message InputPart {
  string msg_type = 1;
  string content = 2;
}

message SendReq {
  int64 sender_id = 1;
  string conv_id = 2;
  string client_msg_id = 3;
  int64 send_ts = 4;         // 客户端发送时间(ms)
  int64 biz_seq = 5;         // 网关分配的全局业务序号
  int64 server_recv_ms = 6;  // 网关接收时间(ms)
  repeated InputPart input = 7;
}
message SendResp { int64 msg_id = 1; int64 seq = 2; } // seq = biz_seq

message ListMessagesReq {
  string conv_id = 1;
  int64 before_seq = 2;
  int32 limit = 3;
}
message MessageItem {
  int64 id = 1;
  string conv_id = 2;
  int64 sender_id = 3;
  int64 seq = 4;
  repeated InputPart input = 5;
}
message ListMessagesResp { repeated MessageItem messages = 1; }

service Message {
  rpc Send(SendReq) returns (SendResp);
  rpc ListMessages(ListMessagesReq) returns (ListMessagesResp);
}
