Name: gateway-api
Host: 0.0.0.0
Port: 10000
MessageRpc:
  Endpoints:
    - 127.0.0.1:20500
Redis:
  Addr: localhost:6379
RocketMQ:
  NameServer:
    - localhost:9876
SendOrder:
  WindowMs: 200
WebSocket:
  OnlineTTL: 300
  HeartbeatInterval: 60
  HeartbeatMaxMiss: 3
  MaxMessageBytes: 65536
  ConnectionMode: multi
  AllowedOrigins:
    - "*"
Auth:
  AccessSecret: dev-secret-change-in-production
