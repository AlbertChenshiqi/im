syntax = "proto3";
package group;
option go_package = "./group";

message IsMemberReq { int64 group_id = 1; int64 user_id = 2; }
message IsMemberResp { bool ok = 1; bool muted = 2; }

message ListMembersReq { int64 group_id = 1; int64 cursor = 2; int32 limit = 3; }
message ListMembersResp { repeated int64 user_ids = 1; int64 next_cursor = 2; }

message GetGroupReq { int64 id = 1; }
message GroupInfo {
  int64 id = 1; string name = 2; int64 owner_id = 3; int32 max_members = 4;
}
message GetGroupResp { GroupInfo group = 1; }

service Group {
  rpc IsMember(IsMemberReq) returns (IsMemberResp);
  rpc ListMembers(ListMembersReq) returns (ListMembersResp);
  rpc GetGroup(GetGroupReq) returns (GetGroupResp);
}
