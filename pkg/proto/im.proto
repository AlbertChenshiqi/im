syntax = "proto3";

package im.v1;
option go_package = "im/pkg/proto/gen;protogen";

message Empty {}

message User {
  int64 id = 1;
  string username = 2;
  string nickname = 3;
  string avatar_url = 4;
}

message RegisterRequest {
  string username = 1;
  string password = 2;
  string nickname = 3;
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message AuthResponse {
  string token = 1;
  User user = 2;
}

message IsGroupMemberRequest {
  int64 group_id = 1;
  int64 user_id = 2;
}

message IsGroupMemberResponse {
  bool ok = 1;
  bool muted = 2;
}

message GetGroupMembersRequest {
  int64 group_id = 1;
  int64 cursor_user_id = 2;
  int32 limit = 3;
}

message GetGroupMembersResponse {
  repeated int64 user_ids = 1;
  int64 next_cursor = 2;
}

service UserService {
  rpc Register(RegisterRequest) returns (AuthResponse);
  rpc Login(LoginRequest) returns (AuthResponse);
  rpc GetUser(Empty) returns (User);
}

service GroupService {
  rpc IsMember(IsGroupMemberRequest) returns (IsGroupMemberResponse);
  rpc GetMembers(GetGroupMembersRequest) returns (GetGroupMembersResponse);
}
